name: Load to MeiliSearch

on:
  workflow_dispatch:
    inputs:
      load_limit:
        description: "Max jobs to load (empty = all pending)"
        required: false
        default: ""
  workflow_run:
    workflows: ["Pipeline", "Workable Pipeline"]
    types: [completed]

concurrency:
  group: dopejobs-meili-load
  cancel-in-progress: false

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Load pending jobs to MeiliSearch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MEILISEARCH_HOST: https://search-internal.dopejobs.xyz
          MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=(--load-pending)
          if [ -n "${{ inputs.load_limit }}" ]; then
            ARGS+=(--load-limit "${{ inputs.load_limit }}")
          fi
          uv run python pipeline.py "${ARGS[@]}"
