name: Workable Pipeline

on:
  schedule:
    - cron: "0 7 * * *"  # Daily at 7am UTC (1hr after main pipeline)
  workflow_dispatch:
    inputs:
      total_shards:
        description: "Total shard count for this rollout"
        required: false
        default: "20"
      companies_per_shard:
        description: "Approximate number of Workable companies each shard should process"
        required: true
        default: "50"
      db_company_limit:
        description: "Optional cap on total DB-selected Workable companies for this run"
        required: false
        default: ""
      max_per_company:
        description: "Optional max jobs fetched per company"
        required: false
        default: ""

concurrency:
  group: workable-pipeline
  cancel-in-progress: false

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.matrix.outputs.shard_matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          total_shards = int("${{ inputs.total_shards }}" or "20")
          print(f"shard_matrix={json.dumps(list(range(total_shards)))}")
          PY

  run-workable-pipeline:
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 25
      matrix:
        shard_index: ${{ fromJson(needs.build-matrix.outputs.shard_matrix) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run sharded Workable scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          TOTAL_SHARDS="${{ inputs.total_shards }}"
          TOTAL_SHARDS="${TOTAL_SHARDS:-20}"
          COMPANIES_PER_SHARD="${{ inputs.companies_per_shard }}"
          COMPANIES_PER_SHARD="${COMPANIES_PER_SHARD:-50}"

          DB_COMPANY_LIMIT="${{ inputs.db_company_limit }}"
          if [ -z "$DB_COMPANY_LIMIT" ]; then
            DB_COMPANY_LIMIT=$(( TOTAL_SHARDS * COMPANIES_PER_SHARD ))
          fi

          ARGS=(
            --companies-from-db
            --ats-filter workable
            --scrape-status-filter pending blocked error empty active
            --shard-index "${{ matrix.shard_index }}"
            --total-shards "$TOTAL_SHARDS"
            --db-company-limit "$DB_COMPANY_LIMIT"
            --skip-parse
            --skip-load
          )

          if [ -n "${{ inputs.max_per_company }}" ]; then
            ARGS+=(--max-per-company "${{ inputs.max_per_company }}")
          fi

          uv run python pipeline.py "${ARGS[@]}"
