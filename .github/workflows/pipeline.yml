name: Pipeline

on:
  workflow_dispatch:
    inputs:
      db_company_limit:
        description: "Optional cap on DB-selected companies for this run"
        required: false
        default: ""
      max_per_company:
        description: "Max jobs fetched per company for this run"
        required: true
        default: "50"
      total_shards:
        description: "Total shard count for this rollout"
        required: true
        default: "8"

concurrency:
  group: dopejobs-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run sharded pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=(
            --companies-from-db
            --shard-index "${{ matrix.shard_index }}"
            --total-shards "${{ inputs.total_shards }}"
            --max-per-company "${{ inputs.max_per_company }}"
            --skip-parse
            --skip-load
          )

          if [ -n "${{ inputs.db_company_limit }}" ]; then
            ARGS+=(--db-company-limit "${{ inputs.db_company_limit }}")
          fi

          uv run python pipeline.py "${ARGS[@]}"
