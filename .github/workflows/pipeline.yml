name: Pipeline

on:
  workflow_dispatch:
    inputs:
      shard_index:
        description: "0-based shard index"
        required: true
        default: "0"
      total_shards:
        description: "Total shard count"
        required: true
        default: "1"
      max_per_company:
        description: "Max jobs fetched per company for this run"
        required: true
        default: "5"
      parse_limit:
        description: "Max jobs parsed for this run"
        required: true
        default: "5"
      skip_load:
        description: "Skip MeiliSearch writes"
        required: true
        default: true
        type: boolean
      skip_parse:
        description: "Skip parsing"
        required: true
        default: false
        type: boolean
      skip_scrape:
        description: "Skip scraping"
        required: true
        default: false
        type: boolean

concurrency:
  group: dopejobs-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Decrypt companies list
        env:
          COMPANIES_PASSPHRASE: ${{ secrets.COMPANIES_PASSPHRASE }}
        run: |
          gpg --quiet --batch --yes \
            --decrypt \
            --passphrase="$COMPANIES_PASSPHRASE" \
            --output "$RUNNER_TEMP/companies.txt" \
            companies.txt.gpg

      - name: Run sharded pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=(
            --companies "$RUNNER_TEMP/companies.txt"
            --shard-index "${{ inputs.shard_index }}"
            --total-shards "${{ inputs.total_shards }}"
            --max-per-company "${{ inputs.max_per_company }}"
            --parse-limit "${{ inputs.parse_limit }}"
          )

          if [ "${{ inputs.skip_scrape }}" = "true" ]; then
            ARGS+=(--skip-scrape)
          fi

          if [ "${{ inputs.skip_parse }}" = "true" ]; then
            ARGS+=(--skip-parse)
          fi

          if [ "${{ inputs.skip_load }}" = "true" ]; then
            ARGS+=(--skip-load)
          fi

          uv run python pipeline.py "${ARGS[@]}"
